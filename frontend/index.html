<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme Colors for Browser UI -->
    <meta
      name="theme-color"
      content="#00e5ff"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#006b8f"
      media="(prefers-color-scheme: light)"
    />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Compare cross-chain bridge routes with real-time pricing and security ratings. Find the best bridge for your crypto transfers."
    />
    <meta
      name="keywords"
      content="crypto bridge, cross-chain, blockchain, defi, bridge aggregator"
    />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Bridge Aggregator - Space Jungle Edition"
    />
    <meta
      property="og:description"
      content="Compare cross-chain bridge routes with real-time pricing"
    />

    <title>Bridge Aggregator - Space Jungle Edition</title>

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <!-- Main App Container -->
    <div id="app"></div>

    <!-- Main Application Script -->
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
